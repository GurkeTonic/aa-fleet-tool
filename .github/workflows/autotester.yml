name: Checks

on:
  push:
    branches:
      - '**'

    tags-ignore:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  # Run pre-commit Checks
  pre-commit:
    name: Pre Commit Checks
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Python
      # Pin the linting interpreter to a stable version. Letting setup-python
      # resolve the newest from pyproject pulls in Python 3.14, which some
      # hooks (e.g. pyupgrade) do not support yet.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run Pre Commit Checks
        uses: pre-commit/action@v3.0.1

  # Run Test Coverage
  test-coverage:
    needs: [pre-commit]
    name: AA Latest (Python ${{ matrix.python-version }} with ${{ matrix.database }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
        database:
          - mysql:8.4
          - mariadb:10.11
          - mariadb:11.4

    services:
      database:
        image: ${{ matrix.database }}
        env:
          MYSQL_ROOT_PASSWORD: temp_password_aa_tox_tests
          MYSQL_DATABASE: temp_allianceauth
        ports:
          - 3306:3306
        options: --tmpfs /var/lib/mysql

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Redis
        uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: 'latest'

      - name: Verify Redis is running
        run: |
          redis-cli ping
          redis-cli info

      # Set up Python
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install Tox and any other packages
      - name: Install Tox and any other packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade tox tox-gh-actions

      # Run Tox with the specified environment
      - name: Run Tox
        env:
          TOX_ENV: allianceauth-latest
        run: tox -v -e ${{ env.TOX_ENV }}

      # Upload coverage to Codecov
      - name: Upload Coverage
        if: ${{
              (
                github.event_name == 'pull_request'
                || (
                  github.event_name == 'push'
                  && github.ref == 'refs/heads/master'
                )
              )
              && (
                matrix.python-version == '3.12'
                && matrix.database == 'mariadb:10.11'
              )
            }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
