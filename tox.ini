[tox]
requires =
    tox>=4.2
env_list =
    allianceauth-{latest}
    py{313, 312, 311, 310}
no_package = true
usedevelop = true

[testenv]
deps =
    coverage
commands =
    coverage run runtests.py aa_fleet_tool -v 2 --debug-mode
    coverage report -m
    coverage xml

[testenv:allianceauth-latest]
set_env =
    DJANGO_SETTINGS_MODULE = testauth.settings.local
install_command =
    python -m pip install -e ".[tests-allianceauth-latest]" -U {opts} {packages}

[flake8]
# Match the line length used by black.
max-line-length = 88
# E203/W503 conflict with black's formatting.
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .tox,
    build,
    dist,
    node_modules
per-file-ignores =
    # Auto-generated migrations keep long literals black won't wrap.
    */migrations/*: E501
    # Test-harness Django settings use the conventional star import.
    testauth/settings/*: E501, F403, F405
